# Starter Project Haystack rule library for brick-bacnet-mcp v0.1.
#
# Pattern style note: see brick_rules.yaml header. We use
# `(?<![A-Za-z])(...)(?![A-Za-z])` instead of `\b...\b` because BACnet object
# names commonly carry `_NNN` numeric suffixes which would defeat `\b` (since
# `_` is a regex word character).
#
# Rules evaluated in file order; first match wins.

# ---------- Outside ----------
- id: hs:oat
  pattern: '(?i)(?<![A-Za-z])(oat|outside[_ ]?air[_ ]?temp|outsideair|oa[_ ]?temp)(?![A-Za-z])'
  units: ['degF', 'degC', '°F', '°C', 'fahrenheit', 'celsius']
  haystack_tags: [point, sensor, outside, air, temp]
  haystack_kind: Number
  haystack_unit: '°F'

- id: hs:oah
  pattern: '(?i)(?<![A-Za-z])(oah|outside[_ ]?air[_ ]?(humidity|rh))(?![A-Za-z])'
  units: ['%', 'percent']
  haystack_tags: [point, sensor, outside, air, humidity]
  haystack_kind: Number
  haystack_unit: '%'

# ---------- Mixed ----------
- id: hs:mat
  pattern: '(?i)(?<![A-Za-z])(mat|mixed[_ ]?air[_ ]?temp)(?![A-Za-z])'
  haystack_tags: [point, sensor, mixed, air, temp]
  haystack_kind: Number
  haystack_unit: '°F'

